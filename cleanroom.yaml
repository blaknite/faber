version: 1
sandbox:
  image:
    ref: ghcr.io/buildkite/cleanroom-base/debian@sha256:66d2bafc1cd64e594b32d9c091f1bc79bc1fb3811686ea920c58f6e4275f6663
  dependencies:
    command: >-
      MISE_TRUSTED_CONFIG_PATHS=/workspace MISE_USE_VERSIONS_HOST=false mise install &&
      ln -sf /root/.local/share/mise/shims/bun /usr/local/bin/bun &&
      ln -sf /root/.local/share/mise/shims/bunx /usr/local/bin/bunx &&
      bun install --frozen-lockfile
    key:
      files:
        - mise.toml
        - bun.lock
  network:
    default: deny
    allow:
      - host: api.github.com
        ports: [443]
      - host: github.com
        ports: [443]
      - host: objects.githubusercontent.com
        ports: [443]
      - host: release-assets.githubusercontent.com
        ports: [443]
      - host: registry.npmjs.org
        ports: [443]
