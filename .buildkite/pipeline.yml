steps:
  - label: ":bun: Test"
    key: test
    command: |
      apt-get update && apt-get install -y git
      git config --global user.email "ci@buildkite.com"
      git config --global user.name "Buildkite CI"
      bun install --frozen-lockfile
      bun test
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"

  - label: ":label: Set version"
    key: set-version
    command: buildkite-agent meta-data set version "$(date -u '+%Y%m%d').${BUILDKITE_BUILD_NUMBER}"
    if: build.branch == "main"
    depends_on: test

  - label: ":hammer: Build (macOS arm64)"
    key: build-darwin-arm64
    command: |
      bun install --frozen-lockfile
      VERSION="$(buildkite-agent meta-data get version)"
      bun build src/index.tsx --compile --target=bun-darwin-arm64 --outfile faber-darwin-arm64 --define "FABER_VERSION=\"$VERSION\""
    artifact_paths: "faber-darwin-arm64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          mount-buildkite-agent: true
    if: build.branch == "main"
    depends_on: set-version

  - label: ":hammer: Build (macOS x64)"
    key: build-darwin-x64
    command: |
      bun install --frozen-lockfile
      VERSION="$(buildkite-agent meta-data get version)"
      bun build src/index.tsx --compile --target=bun-darwin-x64 --outfile faber-darwin-x64 --define "FABER_VERSION=\"$VERSION\""
    artifact_paths: "faber-darwin-x64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          mount-buildkite-agent: true
    if: build.branch == "main"
    depends_on: set-version

  - label: ":hammer: Build (Linux x64)"
    key: build-linux-x64
    command: |
      bun install --frozen-lockfile
      VERSION="$(buildkite-agent meta-data get version)"
      bun build src/index.tsx --compile --target=bun-linux-x64 --outfile faber-linux-x64 --define "FABER_VERSION=\"$VERSION\""
    artifact_paths: "faber-linux-x64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          mount-buildkite-agent: true
    if: build.branch == "main"
    depends_on: set-version

  - label: ":hammer: Build (Linux arm64)"
    key: build-linux-arm64
    command: |
      bun install --frozen-lockfile
      VERSION="$(buildkite-agent meta-data get version)"
      bun build src/index.tsx --compile --target=bun-linux-arm64 --outfile faber-linux-arm64 --define "FABER_VERSION=\"$VERSION\""
    artifact_paths: "faber-linux-arm64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          mount-buildkite-agent: true
    if: build.branch == "main"
    depends_on: set-version

  - label: ":github: Release"
    key: release
    command: |
      buildkite-agent artifact download "faber-darwin-arm64" .
      buildkite-agent artifact download "faber-darwin-x64" .
      buildkite-agent artifact download "faber-linux-x64" .
      buildkite-agent artifact download "faber-linux-arm64" .

      VERSION="$(buildkite-agent meta-data get version)"

      gh release create "v${VERSION}" \
        --title "v${VERSION}" \
        --notes "Build [${BUILDKITE_BUILD_NUMBER}](${BUILDKITE_BUILD_URL}) from commit ${BUILDKITE_COMMIT:0:7}" \
        faber-darwin-arm64 \
        faber-darwin-x64 \
        faber-linux-x64 \
        faber-linux-arm64
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          mount-buildkite-agent: true
          environment:
            - GITHUB_TOKEN
    if: build.branch == "main"
    depends_on:
      - build-darwin-arm64
      - build-darwin-x64
      - build-linux-x64
      - build-linux-arm64
