steps:
  - label: ":bun: Test"
    key: test
    command: |
      apt-get update && apt-get install -y git
      git config --global user.email "ci@buildkite.com"
      git config --global user.name "Buildkite CI"
      bun install --frozen-lockfile
      bun test
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"

  - label: ":label: Set version"
    key: set-version
    command: buildkite-agent meta-data set version "$(date -u '+%Y%m%d').${BUILDKITE_BUILD_NUMBER}"
    if: build.branch == "main"
    depends_on: test

  - label: ":mag: Debug version"
    key: debug-version
    command: |
      echo "FABER_VERSION from env: '${FABER_VERSION}'"
      echo "meta-data: '$(buildkite-agent meta-data get version)'"
      env | grep FABER || echo "FABER_VERSION not in env"
    if: build.branch == "main"
    depends_on: set-version

  - label: ":hammer: Build (macOS arm64)"
    key: build-darwin-arm64
    command: |
      bun install --frozen-lockfile --os=darwin --cpu=arm64
      bun build src/index.tsx --compile --target=bun-darwin-arm64 --outfile faber-darwin-arm64 --define "FABER_VERSION=\"$FABER_VERSION\""
    artifact_paths: "faber-darwin-arm64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          environment:
            - FABER_VERSION
    if: build.branch == "main"
    depends_on: set-version

  - label: ":hammer: Build (macOS x64)"
    key: build-darwin-x64
    command: |
      bun install --frozen-lockfile --os=darwin --cpu=x64
      bun build src/index.tsx --compile --target=bun-darwin-x64 --outfile faber-darwin-x64 --define "FABER_VERSION=\"$FABER_VERSION\""
    artifact_paths: "faber-darwin-x64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          environment:
            - FABER_VERSION
    if: build.branch == "main"
    depends_on: set-version

  - label: ":hammer: Build (Linux x64)"
    key: build-linux-x64
    command: |
      bun install --frozen-lockfile --os=linux --cpu=x64
      bun build src/index.tsx --compile --target=bun-linux-x64 --outfile faber-linux-x64 --define "FABER_VERSION=\"$FABER_VERSION\""
    artifact_paths: "faber-linux-x64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          environment:
            - FABER_VERSION
    if: build.branch == "main"
    depends_on: set-version

  - label: ":hammer: Build (Linux arm64)"
    key: build-linux-arm64
    command: |
      bun install --frozen-lockfile --os=linux --cpu=arm64
      bun build src/index.tsx --compile --target=bun-linux-arm64 --outfile faber-linux-arm64 --define "FABER_VERSION=\"$FABER_VERSION\""
    artifact_paths: "faber-linux-arm64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          environment:
            - FABER_VERSION
    if: build.branch == "main"
    depends_on: set-version

  - label: ":github: Release"
    key: release
    command: |
      (type gh > /dev/null 2>&1) || {
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        apt-get update && apt-get install -y gh
      }

      buildkite-agent artifact download "faber-darwin-arm64" .
      buildkite-agent artifact download "faber-darwin-x64" .
      buildkite-agent artifact download "faber-linux-x64" .
      buildkite-agent artifact download "faber-linux-arm64" .

      gh release create "v${FABER_VERSION}" \
        --title "v${FABER_VERSION}" \
        --notes "Build [${BUILDKITE_BUILD_NUMBER}](${BUILDKITE_BUILD_URL}) from commit ${BUILDKITE_COMMIT:0:7}" \
        faber-darwin-arm64 \
        faber-darwin-x64 \
        faber-linux-x64 \
        faber-linux-arm64
    secrets:
      GH_TOKEN: FABER_RELEASE_TOKEN
    if: build.branch == "main"
    depends_on:
      - build-darwin-arm64
      - build-darwin-x64
      - build-linux-x64
      - build-linux-arm64
