steps:
  - label: ":bun: Test"
    key: test
    command: |
      bun install --frozen-lockfile
      bun test
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"

  - wait

  - label: ":hammer: Build (macOS arm64)"
    key: build-darwin-arm64
    command: |
      bun install --frozen-lockfile
      bun build src/index.tsx --compile --target=bun-darwin-arm64 --outfile faber-darwin-arm64
    artifact_paths: "faber-darwin-arm64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
    if: build.branch == "main"
    depends_on: test

  - label: ":hammer: Build (macOS x64)"
    key: build-darwin-x64
    command: |
      bun install --frozen-lockfile
      bun build src/index.tsx --compile --target=bun-darwin-x64 --outfile faber-darwin-x64
    artifact_paths: "faber-darwin-x64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
    if: build.branch == "main"
    depends_on: test

  - label: ":hammer: Build (Linux x64)"
    key: build-linux-x64
    command: |
      bun install --frozen-lockfile
      bun build src/index.tsx --compile --target=bun-linux-x64 --outfile faber-linux-x64
    artifact_paths: "faber-linux-x64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
    if: build.branch == "main"
    depends_on: test

  - label: ":hammer: Build (Linux arm64)"
    key: build-linux-arm64
    command: |
      bun install --frozen-lockfile
      bun build src/index.tsx --compile --target=bun-linux-arm64 --outfile faber-linux-arm64
    artifact_paths: "faber-linux-arm64"
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
    if: build.branch == "main"
    depends_on: test

  - wait:
      if: build.branch == "main"

  - label: ":github: Release"
    key: release
    command: |
      buildkite-agent artifact download "faber-darwin-arm64" .
      buildkite-agent artifact download "faber-darwin-x64" .
      buildkite-agent artifact download "faber-linux-x64" .
      buildkite-agent artifact download "faber-linux-arm64" .

      VERSION="$(date -u '+%Y%m%d').${BUILDKITE_BUILD_NUMBER}"

      gh release create "v${VERSION}" \
        --title "v${VERSION}" \
        --notes "Build [${BUILDKITE_BUILD_NUMBER}](${BUILDKITE_BUILD_URL}) from commit ${BUILDKITE_COMMIT:0:7}" \
        faber-darwin-arm64 \
        faber-darwin-x64 \
        faber-linux-x64 \
        faber-linux-arm64
    plugins:
      - docker#v5.12.0:
          image: "oven/bun:latest"
          environment:
            - GITHUB_TOKEN
    if: build.branch == "main"
    depends_on:
      - build-darwin-arm64
      - build-darwin-x64
      - build-linux-x64
      - build-linux-arm64
